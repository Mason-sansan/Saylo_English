<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Home — dopamine preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bangers&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=IBM+Plex+Mono:wght@500;600&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --void: #0d0d1a;
      --muted-bg: #2d1b4e;
      --fg: #ffffff;
      --a1: #ff3af2;
      --a2: #00f5d4;
      --a3: #ffe600;
      --a4: #ff6b35;
      --a5: #7b2fff;
      --r-card: 24px;
      --font-head: 'Outfit', system-ui, sans-serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-bang: 'Bangers', cursive;
    }

    @keyframes float-y {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-10px) rotate(4deg); }
    }
    @keyframes pulse-glow {
      0%, 100% {
        box-shadow:
          0 0 24px rgba(255, 58, 242, 0.45),
          0 0 48px rgba(0, 245, 212, 0.25),
          8px 8px 0 var(--a3),
          16px 16px 0 var(--a1);
      }
      50% {
        box-shadow:
          0 0 36px rgba(255, 58, 242, 0.65),
          0 0 72px rgba(255, 230, 0, 0.35),
          10px 10px 0 var(--a3),
          20px 20px 0 var(--a1);
      }
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes wiggle {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }

    body {
      font: 16px/1.55 var(--font-body);
      color: var(--fg);
      background: var(--void);
      -webkit-font-smoothing: antialiased;
    }

    /* Global pattern stack */
    .shell {
      position: relative;
      min-height: 100svh;
      max-width: 430px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      background-color: var(--void);
      background-image:
        radial-gradient(ellipse at 20% 15%, rgba(255, 58, 242, 0.14) 0%, transparent 45%),
        radial-gradient(ellipse at 85% 40%, rgba(0, 245, 212, 0.12) 0%, transparent 42%),
        radial-gradient(ellipse at 50% 95%, rgba(123, 47, 255, 0.12) 0%, transparent 50%),
        radial-gradient(circle, rgba(255, 58, 242, 0.11) 1px, transparent 1px),
        repeating-linear-gradient(
          52deg,
          transparent,
          transparent 11px,
          rgba(255, 230, 0, 0.06) 11px,
          rgba(255, 230, 0, 0.06) 22px
        );
      background-size: 100% 100%, 100% 100%, 100% 100%, 22px 22px, 100% 100%;
    }

    .shell::before {
      content: '';
      position: fixed;
      inset: 0;
      max-width: 430px;
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
      z-index: 0;
      background-image: conic-gradient(
        from 90deg at 1px 1px,
        transparent 90deg,
        rgba(0, 245, 212, 0.04) 0
      );
      background-size: 36px 36px;
      mix-blend-mode: screen;
    }

    .mega-watermark {
      position: absolute;
      top: 52px;
      left: 50%;
      transform: translateX(-46%);
      font-family: var(--font-bang);
      font-size: clamp(6rem, 28vw, 9rem);
      letter-spacing: 0.02em;
      color: var(--a5);
      opacity: 0.12;
      pointer-events: none;
      z-index: 1;
      white-space: nowrap;
      text-shadow: 3px 3px 0 var(--a1), 6px 6px 0 var(--a2);
      animation: wiggle 3.5s ease-in-out infinite;
    }

    .note {
      position: relative;
      z-index: 2;
      font-size: 11px;
      color: var(--fg);
      text-align: center;
      padding: 10px 14px;
      border-bottom: 4px dashed var(--a2);
      background: rgba(45, 27, 78, 0.75);
      backdrop-filter: blur(8px);
    }
    .note code {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--a2);
    }

    .float-emoji {
      position: absolute;
      z-index: 2;
      font-size: 1.75rem;
      pointer-events: none;
      animation: float-y 5s ease-in-out infinite;
      filter: drop-shadow(2px 2px 0 var(--a5));
    }
    .float-emoji.e1 { top: 120px; right: 8%; animation-delay: 0s; }
    .float-emoji.e2 { top: 240px; left: 6%; animation-delay: -1.2s; font-size: 1.4rem; }
    .float-emoji.e3 { top: 420px; right: 10%; animation-delay: -2s; }

    .topbar {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: calc(env(safe-area-inset-top, 0px) + 14px) 18px 12px;
      border-bottom: 4px solid var(--a1);
    }

    .topbar-brand {
      font-family: var(--font-head);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg);
      text-shadow: 2px 2px 0 var(--a5), 4px 4px 0 var(--a2);
    }

    .topbar-level {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 999px;
      border: 4px solid var(--a3);
      background: linear-gradient(135deg, rgba(255, 58, 242, 0.25), rgba(123, 47, 255, 0.35));
      box-shadow: 0 0 20px rgba(255, 230, 0, 0.35), 4px 4px 0 var(--a4);
      font-variant-numeric: tabular-nums;
    }

    .page {
      position: relative;
      z-index: 2;
      flex: 1 1 auto;
      padding: 0 16px calc(env(safe-area-inset-bottom, 0px) + 88px);
    }

    .growth-hero {
      position: relative;
      margin: 20px 0 24px;
      padding: 22px 18px 20px;
      border-radius: var(--r-card);
      border: 4px solid var(--a2);
      background: rgba(45, 27, 78, 0.82);
      backdrop-filter: blur(10px);
      box-shadow:
        0 0 32px rgba(255, 58, 242, 0.35),
        8px 8px 0 var(--a5),
        16px 16px 0 var(--a4);
      transform: rotate(-0.8deg);
    }

    .growth-hero-split {
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: nowrap;
    }

    .growth-hero-score {
      flex: 1;
      min-width: 0;
    }

    .growth-level {
      font-family: var(--font-head);
      font-size: 72px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--fg);
      text-shadow: 3px 3px 0 var(--a1), 6px 6px 0 var(--a2), 9px 9px 0 var(--a5);
    }

    .growth-level-label {
      margin-top: 10px;
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.82);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .growth-level-delta {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
    }

    .growth-level-delta-val {
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--a2);
      text-shadow: 1px 1px 0 var(--a5);
    }

    .growth-cal {
      flex-shrink: 0;
      width: 188px;
      max-width: 188px;
      border-radius: 20px;
      border: 4px dotted var(--a3);
      padding: 8px 6px 6px;
      background: rgba(13, 13, 26, 0.65);
      box-shadow:
        0 0 24px rgba(0, 245, 212, 0.25),
        inset 0 0 0 2px rgba(255, 58, 242, 0.35);
    }

    .growth-cal-title {
      font-family: var(--font-head);
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--a1);
      margin-bottom: 4px;
      text-align: center;
      text-shadow: 1px 1px 0 var(--a5);
    }

    .growth-cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      margin-bottom: 3px;
    }

    .growth-cal-wd {
      font-size: 8px;
      font-weight: 800;
      color: var(--a2);
      text-align: center;
    }

    .growth-cal-grid {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .growth-cal-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .growth-cal-cell {
      min-height: 16px;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 2px 1px;
      border: 2px solid transparent;
    }

    .growth-cal-cell.is-empty {
      min-height: 0;
      padding: 0;
      border: 0;
    }

    .growth-cal-cell.has-time {
      background: rgba(255, 58, 242, 0.2);
      border: 2px solid var(--a2);
      box-shadow: 0 0 10px rgba(255, 230, 0, 0.25);
    }

    .growth-cal-dom {
      font-size: 9px;
      font-weight: 800;
      color: var(--fg);
      line-height: 1.05;
    }

    .growth-cal-check {
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
      color: var(--a3);
    }

    @media (max-width: 350px) {
      .growth-hero-split {
        flex-direction: column;
        align-items: flex-start;
      }
      .growth-cal {
        width: 100%;
        max-width: none;
      }
    }

    /* Session deck — accent rotation */
    .session-deck {
      position: relative;
      padding: 22px 18px 20px;
      border-radius: var(--r-card);
      border: 4px solid var(--a4);
      background: rgba(45, 27, 78, 0.75);
      box-shadow:
        0 0 28px rgba(255, 107, 53, 0.35),
        10px 10px 0 var(--a1);
      transform: rotate(0.6deg);
    }

    .session-deck::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: calc(var(--r-card) - 4px);
      pointer-events: none;
      background: repeating-linear-gradient(
        -36deg,
        transparent,
        transparent 14px,
        rgba(123, 47, 255, 0.05) 14px,
        rgba(123, 47, 255, 0.05) 28px
      );
    }

    .deck-eyebrow {
      position: relative;
      z-index: 1;
      margin: 0 0 14px;
      font-family: var(--font-bang);
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      color: var(--a3);
      text-shadow: 2px 2px 0 var(--a5);
      transform: rotate(-2deg);
    }

    .deck-dur {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .deck-dur-label {
      font-family: var(--font-head);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--a2);
      text-shadow: 1px 1px 0 var(--a1);
    }

    .deck-seg {
      display: flex;
      gap: 8px;
      padding: 6px;
      border-radius: 999px;
      border: 4px dashed var(--a5);
      background: rgba(13, 13, 26, 0.5);
    }

    .deck-seg button {
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 12px 8px;
      font-family: var(--font-mono);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.55);
      background: transparent;
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55), color 0.2s, box-shadow 0.2s;
    }

    .deck-seg button.on {
      color: var(--void);
      background: linear-gradient(90deg, var(--a3), var(--a2));
      border: 3px solid var(--a1);
      box-shadow: 4px 4px 0 var(--a5), 0 0 20px rgba(255, 230, 0, 0.4);
      transform: scale(1.04);
    }

    .deck-seg button:not(.on):hover {
      color: var(--fg);
      transform: scale(1.02);
    }

    .deck-cta {
      position: relative;
      z-index: 1;
      margin-top: 22px;
      width: 100%;
      border: 4px solid var(--a3);
      border-radius: 999px;
      padding: 0;
      cursor: pointer;
      text-align: left;
      background: linear-gradient(105deg, var(--a1) 0%, var(--a5) 45%, var(--a2) 100%);
      background-size: 220% 100%;
      animation: gradient-shift 5s ease infinite;
      box-shadow:
        0 0 28px rgba(255, 58, 242, 0.55),
        0 0 48px rgba(0, 245, 212, 0.3),
        8px 8px 0 var(--a4),
        16px 16px 0 var(--a5);
      transition: transform 0.25s ease-out;
    }

    .deck-cta:hover {
      transform: scale(1.03) translateY(-2px);
      animation-duration: 3s;
    }

    .deck-cta:active {
      transform: scale(0.97);
    }

    .deck-cta:focus-visible {
      outline: 4px solid var(--a2);
      outline-offset: 4px;
    }

    .deck-cta-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px 18px 22px;
    }

    .deck-cta-kicker {
      display: block;
      font-family: var(--font-head);
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--void);
      opacity: 0.85;
      margin-bottom: 6px;
    }

    .deck-cta-title {
      display: block;
      font-family: var(--font-head);
      font-size: 26px;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.05;
      text-transform: uppercase;
      color: var(--fg);
      text-shadow: 2px 2px 0 var(--a5), 4px 4px 0 var(--void);
    }

    .deck-cta-sub {
      display: block;
      margin-top: 8px;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 500;
      color: rgba(13, 13, 26, 0.88);
      max-width: 240px;
    }

    .deck-cta-icon {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 4px solid var(--void);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 900;
      color: var(--void);
      background: var(--a3);
      box-shadow: 3px 3px 0 var(--a2);
      animation: pulse-glow 2.5s ease-in-out infinite;
    }

    .sparkle {
      position: absolute;
      width: 10px;
      height: 10px;
      background: var(--a3);
      clip-path: polygon(50% 0%, 65% 35%, 100% 50%, 65% 65%, 50% 100%, 35% 65%, 0% 50%, 35% 35%);
      pointer-events: none;
      z-index: 3;
      animation: spin-slow 18s linear infinite;
      opacity: 0.85;
    }
    .sparkle.s1 { top: 18%; left: 4%; }
    .sparkle.s2 { top: 62%; right: 5%; width: 14px; height: 14px; background: var(--a2); animation-duration: 24s; }
    .sparkle.s3 { bottom: 120px; left: 12%; background: var(--a1); }

    .tabbar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: min(430px, 100%);
      padding: 10px 14px calc(env(safe-area-inset-bottom, 0px) + 10px);
      border-top: 4px solid var(--a2);
      background: rgba(13, 13, 26, 0.92);
      backdrop-filter: blur(16px);
      display: flex;
      gap: 10px;
      z-index: 50;
    }

    .tab {
      position: relative;
      flex: 1;
      border: 0;
      border-radius: 999px;
      padding: 12px;
      min-height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(45, 27, 78, 0.8);
      border: 4px solid var(--a5);
      color: var(--a2);
      cursor: default;
      transition: transform 0.2s ease, box-shadow 0.2s;
    }

    .tab.active {
      background: linear-gradient(135deg, var(--a1), var(--a5));
      border-color: var(--a3);
      color: var(--fg);
      box-shadow: 0 0 24px rgba(255, 58, 242, 0.5), 4px 4px 0 var(--a4);
      transform: scale(1.06);
    }

    .tab-icon {
      width: 18px;
      height: 18px;
    }

    @media (prefers-reduced-motion: reduce) {
      .mega-watermark,
      .float-emoji,
      .sparkle,
      .deck-cta-icon {
        animation: none;
      }
      .deck-cta {
        animation: none;
        background: linear-gradient(105deg, var(--a1) 0%, var(--a5) 50%, var(--a2) 100%);
      }
      .deck-cta:hover {
        transform: none;
      }
      * {
        transition-duration: 0.15s !important;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <span class="mega-watermark" aria-hidden="true">GO!</span>
    <span class="sparkle s1" aria-hidden="true"></span>
    <span class="sparkle s2" aria-hidden="true"></span>
    <span class="sparkle s3" aria-hidden="true"></span>
    <span class="float-emoji e1" aria-hidden="true">✨</span>
    <span class="float-emoji e2" aria-hidden="true">⚡</span>
    <span class="float-emoji e3" aria-hidden="true">💬</span>

    <div class="note">
      <strong style="color: var(--a3)">Dopamine / maximalism</strong> mock · same layout as before ·
      <code>/home-design-alt.html</code>
    </div>

    <div class="topbar">
      <div class="topbar-brand">English</div>
      <div class="topbar-level">4.2</div>
    </div>

    <main class="page">
      <div class="growth-hero growth-hero-split">
        <div class="growth-hero-score">
          <div class="growth-level">4.2</div>
          <div class="growth-level-label">Overall level · 1.0 – 5.0 scale</div>
          <div class="growth-level-delta">
            This month Δ overall
            <span class="growth-level-delta-val">+0.3</span>
          </div>
        </div>
        <div class="growth-cal">
          <div class="growth-cal-title">2026 Apr · 90m</div>
          <div class="growth-cal-weekdays" aria-hidden="true">
            <span class="growth-cal-wd">S</span>
            <span class="growth-cal-wd">M</span>
            <span class="growth-cal-wd">T</span>
            <span class="growth-cal-wd">W</span>
            <span class="growth-cal-wd">T</span>
            <span class="growth-cal-wd">F</span>
            <span class="growth-cal-wd">S</span>
          </div>
          <div class="growth-cal-grid">
            <div class="growth-cal-row">
              <div class="growth-cal-cell is-empty"></div>
              <div class="growth-cal-cell is-empty"></div>
              <div class="growth-cal-cell is-empty"></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">1</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">2</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">3</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">4</span></div>
            </div>
            <div class="growth-cal-row">
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">5</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">6</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">7</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">8</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">9</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">10</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">11</span><span class="growth-cal-check">✓</span></div>
            </div>
            <div class="growth-cal-row">
              <div class="growth-cal-cell"><span class="growth-cal-dom">12</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">13</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">14</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">15</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">16</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">17</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">18</span></div>
            </div>
            <div class="growth-cal-row">
              <div class="growth-cal-cell"><span class="growth-cal-dom">19</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">20</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">21</span></div>
              <div class="growth-cal-cell has-time"><span class="growth-cal-dom">22</span><span class="growth-cal-check">✓</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">23</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">24</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">25</span></div>
            </div>
            <div class="growth-cal-row">
              <div class="growth-cal-cell"><span class="growth-cal-dom">26</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">27</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">28</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">29</span></div>
              <div class="growth-cal-cell"><span class="growth-cal-dom">30</span></div>
              <div class="growth-cal-cell is-empty"></div>
              <div class="growth-cal-cell is-empty"></div>
            </div>
          </div>
        </div>
      </div>

      <section class="session-deck" aria-label="Session setup">
        <p class="deck-eyebrow">Let’s go!!</p>
        <div class="deck-dur">
          <span class="deck-dur-label">Duration</span>
          <div class="deck-seg" role="radiogroup" aria-label="Session duration">
            <button type="button" class="on" aria-pressed="true">3m</button>
            <button type="button" aria-pressed="false">10m</button>
            <button type="button" aria-pressed="false">20m</button>
          </div>
        </div>
        <button type="button" class="deck-cta">
          <span class="deck-cta-inner">
            <span>
              <span class="deck-cta-kicker">Live dialogue</span>
              <span class="deck-cta-title">Conversation</span>
              <span class="deck-cta-sub">Timed turns, roles, and structured feedback when you’re done.</span>
            </span>
            <span class="deck-cta-icon" aria-hidden="true">→</span>
          </span>
        </button>
      </section>
    </main>

    <nav class="tabbar" aria-label="Main">
      <button type="button" class="tab active" aria-label="Home" aria-current="page">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M3 10.5 12 3l9 7.5V20a1.5 1.5 0 0 1-1.5 1.5H5A1.5 1.5 0 0 1 3.5 20v-9.5zM9 21.5V12h6v9.5" />
        </svg>
      </button>
      <button type="button" class="tab" aria-label="Growth">
        <svg class="tab-icon" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M5 18V14M12 18V6M19 18v-7" />
        </svg>
      </button>
    </nav>
  </div>

  <script>
    document.querySelectorAll('.deck-seg button').forEach((btn, i, arr) => {
      btn.addEventListener('click', () => {
        arr.forEach((b) => { b.classList.remove('on'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('on');
        btn.setAttribute('aria-pressed', 'true');
      });
    });
  </script>
</body>
</html>
